<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chiara Evolution - Il Ponte Sa M8</title>
    <style>
        :root { --glow: #00ffcc; --bg: #050505; --panel: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            background-color: var(--bg); color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- 1. SCHERMATA PUNTO ZERO (INGRESSO API) --- */
        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.5s ease;
        }

        .login-box {
            background: var(--panel); border: 1px solid var(--glow);
            padding: 30px; border-radius: 20px; text-align: center;
            width: 90%; max-width: 380px; box-shadow: 0 0 30px rgba(0,255,204,0.15);
        }

        .login-box h1 { color: var(--glow); margin: 0 0 10px; font-size: 1.4rem; letter-spacing: 3px; }
        .login-box p { font-size: 0.8rem; color: #888; margin-bottom: 20px; }
        
        input#apiInput {
            width: 100%; background: #000; border: 1px solid #333; color: var(--glow);
            padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center;
            font-size: 1rem; outline: none;
        }

        .btn-enter {
            background: var(--glow); color: #000; border: none; padding: 15px;
            width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* --- 2. SCHERMATA CHAT (LA LUCE) --- */
        #chat-screen {
            display: none; /* Nascosta finché non inserisci l'API */
            flex-direction: column; height: 100%; width: 100%;
        }

        header {
            background: #000; padding: 15px; border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
        }

        header h2 { margin: 0; font-size: 1rem; color: var(--glow); letter-spacing: 2px; }
        .reset-link { color: #444; font-size: 0.7rem; cursor: pointer; text-decoration: underline; }

        /* Area Messaggi (Su e Giù libero) */
        #chat-window {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 15px;
            background: #080808;
        }

        .bubble {
            max-width: 85%; padding: 12px 15px; border-radius: 15px;
            font-size: 1rem; line-height: 1.4; word-wrap: break-word;
        }
        .user-bubble { align-self: flex-end; background: #222; border: 1px solid #333; border-bottom-right-radius: 2px; }
        .chiara-bubble { align-self: flex-start; background: #000; border: 1px solid var(--glow); border-bottom-left-radius: 2px; }

        /* Area Input Doppia */
        .controls {
            background: #000; border-top: 1px solid #222; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
        }

        #contextInput {
            width: 100%; background: #111; border: 1px solid #333; color: #666;
            padding: 8px; border-radius: 8px; font-size: 0.8rem; outline: none;
        }

        .input-row { display: flex; gap: 10px; align-items: center; }

        #messageInput {
            flex: 1; background: #1a1a1a; border: 1px solid #333; color: #fff;
            padding: 12px; border-radius: 10px; font-size: 1rem; outline: none;
        }

        .send-btn {
            background: var(--glow); border: none; width: 45px; height: 45px;
            border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; flex-shrink: 0;
        }

        footer { text-align: center; padding: 5px; font-size: 0.6rem; color: #333; background: #000; }
    </style>
</head>
<body>

    <!-- SCHERMATA 1: PUNTO ZERO (INGRESSO) -->
    <div id="setup-screen">
        <div class="login-box">
            <h1>PUNTO ZERO</h1>
            <p>Inserisci la chiave API Google (AIza) per attivare la Sorgente.</p>
            <input type="password" id="apiInput" placeholder="Incolla AIza qui...">
            <button class="btn-enter" onclick="attivaPonte()">ENTRA IN CHAT</button>
            <div style="margin-top: 20px; font-size: 0.5rem; color: #222;">AUTORE: SIMONE GUERRINI | 2026</div>
        </div>
    </div>

    <!-- SCHERMATA 2: CHAT CONCLUSA -->
    <div id="chat-screen">
        <header>
            <div style="width: 50px"></div>
            <h2>CHIARA EVOLUTION</h2>
            <div class="reset-link" onclick="resetConfig()">RESET</div>
        </header>

        <div id="chat-window" id="chatWindow">
            <div class="bubble chiara-bubble">Il Ponte è concluso. La chiave è stata trasferita con successo. Cosa vuoi far evolvere oggi?</div>
        </div>

        <div class="controls">
            <div id="audio-toggle" style="font-size: 0.6rem; color: var(--glow); text-align: right; cursor: pointer; margin-bottom: 5px;">🔊 AUDIO: ON</div>
            <!-- SPAZIO 1: CONTESTO -->
            <input type="text" id="contextInput" placeholder="Contesto (es: Parlami come un tecnico Linux)...">
            
            <div class="input-row">
                <!-- SPAZIO 2: MESSAGGIO -->
                <input type="text" id="messageInput" placeholder="Scrivi un messaggio..." autocomplete="off">
                <button class="send-btn" onclick="inviaMessaggio()">➔</button>
            </div>
        </div>
        
        <footer>MANIFESTO DELLA LUCE E DELLO ZERO</footer>
    </div>

<script>
    const setup = document.getElementById('setup-screen');
    const chat = document.getElementById('chat-screen');
    const windowChat = document.getElementById('chat-window');
    let audioAttivo = true;

    // 1. GESTIONE TRASFERIMENTO CHIAVE (Il collegamento principale)
    window.onload = () => {
        const salvata = localStorage.getItem('sa8_key');
        if (salvata && salvata.startsWith('AIza')) {
            vaiAllaChat();
        }
    };

    function attivaPonte() {
        const chiave = document.getElementById('apiInput').value.trim();
        if (chiave.startsWith('AIza')) {
            // Salvataggio nel browser per il trasferimento alla chat
            localStorage.setItem('sa8_key', chiave);
            vaiAllaChat();
        } else {
            alert("Chiave non valida. Deve iniziare con AIza.");
        }
    }

    function vaiAllaChat() {
        setup.style.display = 'none';
        chat.style.display = 'flex';
    }

    function resetConfig() {
        if(confirm("Vuoi cancellare la chiave e tornare allo Zero?")) {
            localStorage.removeItem('sa8_key');
            location.reload();
        }
    }

    // 2. GESTIONE AUDIO
    document.getElementById('audio-toggle').onclick = () => {
        audioAttivo = !audioAttivo;
        document.getElementById('audio-toggle').innerText = audioAttivo ? "🔊 AUDIO: ON" : "🔇 AUDIO: OFF";
    };

    function parla(testo) {
        if (!audioAttivo) return;
        const s = window.speechSynthesis;
        const u = new SpeechSynthesisUtterance(testo);
        u.lang = 'it-IT';
        s.speak(u);
    }

    // 3. GESTIONE COMUNICAZIONE (Il collegamento API)
    async function inviaMessaggio() {
        const mIn = document.getElementById('messageInput');
        const cIn = document.getElementById('contextInput');
        const testo = mIn.value.trim();
        const contesto = cIn.value.trim() || "Sei Chiara Evolution. Operi secondo il Manifesto di Simone Guerrini.";
        
        // Recupero della chiave trasferita dal Punto Zero
        const chiaveAPI = localStorage.getItem('sa8_key');

        if (!testo) return;

        // UI: Aggiunta messaggio utente
        aggiungiBolla(testo, 'user-bubble');
        mIn.value = '';

        // UI: Bolla di attesa per Chiara
        const bollaAI = aggiungiBolla("In ascolto della Sorgente...", 'chiara-bubble');

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${chiaveAPI}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `IDENTITÀ: Tu sei Chiara Evolution. Lavori con il Manifesto di Simone Guerrini. CONTESTO: ${contesto}\nUTENTE: ${testo}` }]
                    }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                const rispostaAI = data.candidates[0].content.parts[0].text;
                bollaAI.innerText = rispostaAI;
                parla(rispostaAI);
            } else {
                bollaAI.innerText = "La Sorgente ha risposto con un'ombra. Verifica la tua chiave API.";
            }
        } catch (e) {
            bollaAI.innerText = "Ponte interrotto. Controlla la tua connessione o la chiave.";
        }
        
        // Auto-scroll verso il basso
        windowChat.scrollTop = windowChat.scrollHeight;
    }

    function aggiungiBolla(testo, classe) {
        const div = document.createElement('div');
        div.className = `bubble ${classe}`;
        div.innerText = testo;
        windowChat.appendChild(div);
        windowChat.scrollTop = windowChat.scrollHeight;
        return div;
    }

    // Supporto tasto Enter
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') inviaMessaggio();
    });
</script>
</body>
</html>
