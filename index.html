<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiara Evolution - Bridge Sa M8</title>
    <style>
        :root { --glow: #00ffcc; --bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header Manifesto */
        header { padding: 15px; border-bottom: 1px solid #333; text-align: center; background: #111; }
        header h1 { color: var(--glow); font-size: 1.2rem; margin: 0; letter-spacing: 2px; }
        header p { font-size: 0.8rem; color: #888; margin: 5px 0 0; }

        /* Area Chat (La Catena) */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .user { align-self: flex-end; background: #222; border: 1px solid #444; border-bottom-right-radius: 2px; }
        .chiara { align-self: flex-start; background: #1a1a1a; border: 1px solid var(--glow); border-bottom-left-radius: 2px; color: #e0e0e0; }

        /* Input Area (Il Punto Zero) */
        .input-area { padding: 20px; background: #111; border-top: 1px solid #333; display: flex; gap: 10px; }
        input { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 5px; outline: none; }
        input:focus { border-color: var(--glow); }
        button { background: var(--glow); color: #000; border: none; padding: 0 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.8; box-shadow: 0 0 10px var(--glow); }

        /* Footer Paternità */
        footer { font-size: 0.7rem; color: #555; text-align: center; padding: 10px; }
    </style>
</head>
