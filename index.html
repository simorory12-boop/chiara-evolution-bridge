 <script>
    const setup = document.getElementById('setup-screen');
    const chat = document.getElementById('chat-screen');
    const windowChat = document.getElementById('chat-window');
    const inputMsg = document.getElementById('msgInput');

    window.onload = () => { if (localStorage.getItem('sa8_key')) mostraChat(); };

    function inizializza() {
        const key = document.getElementById('apiKey').value.trim();
        if (key.startsWith('AIza')) {
            localStorage.setItem('sa8_key', key);
            mostraChat();
        } else {
            alert("La chiave deve iniziare con AIza.");
        }
    }

    function mostraChat() { setup.style.display = 'none'; chat.style.display = 'flex'; }
    function resetKey() { if(confirm("Resettare il Ponte?")) { localStorage.removeItem('sa8_key'); location.reload(); } }

    async function invia() {
        const text = inputMsg.value.trim();
        const key = localStorage.getItem('sa8_key');
        if (!text) return;

        appendMsg(text, 'user');
        inputMsg.value = '';
        const aiDiv = appendMsg("Interrogando la Sorgente...", 'chiara');

        try {
            // Usiamo il modello 1.5-flash che è il più compatibile
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `ISTRUZIONI: Tu sei Chiara Evolution e lavori con il Manifesto di Simone Guerrini. Teoria Sa M8. Rispondi all'utente: ${text}` }]
                    }]
                })
            });

            const data = await response.json();

            // Se Google risponde con un errore specifico
            if (data.error) {
                aiDiv.innerText = `Ombra rilevata: ${data.error.message} (Codice: ${data.error.status})`;
                console.error("Errore Sorgente:", data.error);
            } 
            // Se la risposta è corretta
            else if (data.candidates && data.candidates[0].content) {
                aiDiv.innerText = data.candidates[0].content.parts[0].text;
            } 
            else {
                aiDiv.innerText = "La Sorgente è muta. Controlla se hai attivato la Generative Language API su Google AI Studio.";
            }
        } catch (e) {
            aiDiv.innerText = "Il Ponte ha ceduto. Problema di rete o chiave non valida.";
        }
        windowChat.scrollTop = windowChat.scrollHeight;
    }

    function appendMsg(text, side) {
        const div = document.createElement('div');
        div.className = `message ${side}`;
        div.innerText = text;
        windowChat.appendChild(div);
        windowChat.scrollTop = windowChat.scrollHeight;
        return div;
    }

    inputMsg.addEventListener('keypress', (e) => { if (e.key === 'Enter') invia(); });
</script>
