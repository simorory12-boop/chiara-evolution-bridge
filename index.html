<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiara Evolution - Il Punto Zero</title>
    <style>
        :root { --glow: #00ffcc; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* SCHERMATA UNO: IL PUNTO ZERO (Ingresso API) */
        #setup-screen { text-align: center; padding: 20px; transition: opacity 0.5s; }
        .box { border: 1px solid var(--glow); padding: 30px; border-radius: 5px; box-shadow: 0 0 20px rgba(0,255,204,0.2); }
        input { background: #111; border: 1px solid #444; color: var(--glow); padding: 10px; width: 280px; text-align: center; outline: none; margin-bottom: 20px; }
        button { background: var(--glow); color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; letter-spacing: 1px; }

        /* SCHERMATA DUE: LA LUCE (Chat - Nascosta all'inizio) */
        #chat-screen { display: none; width: 100%; height: 100vh; flex-direction: column; background: #0a0a0a; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 10px; border-radius: 5px; font-size: 0.9rem; line-height: 1.4; }
        .user { align-self: flex-end; background: #222; border: 1px solid #444; }
        .chiara { align-self: flex-start; border: 1px solid var(--glow); background: #111; }
        
        .input-area { padding: 15px; border-top: 1px solid #333; display: flex; gap: 10px; background: #050505; }
        #msgInput { flex: 1; background: #111; border: 1px solid #444; color: #fff; padding: 10px; text-align: left; margin: 0; }
        
        header { padding: 10px; border-bottom: 1px solid #333; text-align: center; font-size: 0.8rem; color: var(--glow); letter-spacing: 3px; }
        footer { font-size: 0.6rem; color: #444; padding: 5px; text-align: center; }
    </style>
</head>
<body>

    <!-- PRIMA ENTRATA: IL SEME -->
    <div id="setup-screen">
        <div class="box">
            <h1 style="font-size: 1.2rem; margin-bottom: 10px;">PUNTO ZER
