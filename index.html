<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chiara Evolution - Il Ponte Sa M8</title>
    <style>
        :root { --glow: #00ffcc; --bg: #050505; --panel: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; 
        }

        /* --- 1. LA PORTA PRINCIPALE (INGRESSO PK) --- */
        #zero-point {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 1000; flex-direction: column;
        }

        .door-box {
            border: 1px solid var(--glow); padding: 40px; border-radius: 20px;
            text-align: center; background: var(--panel); width: 90%; max-width: 400px;
            box-shadow: 0 0 50px rgba(0,255,204,0.1);
        }

        .door-box h1 { color: var(--glow); letter-spacing: 5px; font-size: 1.5rem; margin-bottom: 10px; }
        
        input#pk-input {
            width: 100%; background: #000; border: 1px solid #333; color: var(--glow);
            padding: 15px; border-radius: 10px; margin: 20px 0; outline: none; text-align: center;
            font-size: 1rem;
        }

        .btn-open {
            background: var(--glow); color: #000; border: none; padding: 15px;
            border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%;
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* --- 2. LA CHAT (LA LUCE) --- */
        #chat-screen {
            display: none; /* Nascosto finché non si apre la porta */
            flex-direction: column; height: 100%; width: 100%;
        }

        header {
            padding: 15px; background: #000; border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
        }

        header h2 { font-size: 1rem; color: var(--glow); margin: 0; letter-spacing: 2px; }

        /* Area Messaggi: Scorrimento libero */
        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px; display: flex;
            flex-direction: column; gap: 15px; background: #080808;
        }

        .bubble { max-width: 85%; padding: 15px; border-radius: 15px; line-height: 1.5; font-size: 1rem; }
        .user { align-self: flex-end; background: #222; border: 1px solid #444; border-bottom-right-radius: 2px; }
        .chiara { align-self: flex-start; background: #0a0a0a; border: 1px solid var(--glow); border-bottom-left-radius: 2px; }

        /* Area Input Doppia */
        .controls {
            padding: 15px; background: #000; border-top: 1px solid #222;
            display: flex; flex-direction: column; gap: 10px;
        }

        /* Spazio 1: Contesto/Sistema */
        #contextInput {
            background: #111; border: 1px solid #333; color: #666;
            padding: 8px; border-radius: 5px; font-size: 0.8rem; outline: none;
        }

        .input-row { display: flex; gap: 10px; align-items: center; }

        /* Spazio 2: Messaggio Utente */
        #messageInput {
            flex: 1; background: #1a1a1a; border: 1px solid #444; color: #fff;
            padding: 12px; border-radius: 10px; outline: none; font-size: 1rem;
        }

        .send-btn {
            background: var(--glow); border: none; width: 45px; height: 45px;
            border-radius: 50%; cursor: pointer; display: flex;
            justify-content: center; align-items: center; font-size: 1.2rem;
        }

        #audio-status { font-size: 0.6rem; color: var(--glow); text-align: right; cursor: pointer; }

        footer { font-size: 0.6rem; color: #333; text-align: center; padding: 5px; background: #000; }
    </style>
</head>
<body>

    <!-- PORTA PRINCIPALE -->
    <div id="zero-point">
        <div class="door-box">
            <h1>SORGENTE</h1>
            <p style="font-size: 0.8rem; color:#888;">Inserisci la PK (Google AIza) per entrare</p>
            <input type="password" id="pk-input" placeholder="Incolla PK qui...">
            <button class="btn-open" onclick="apriPorta()">ENTRA NELLA CHAT</button>
        </div>
        <p style="margin-top:20px; font-size:0.5rem; color:#222;">MANIFESTO DI SIMONE GUERRINI | 2026</p>
    </div>

    <!-- CHAT CONNESSA -->
    <div id="chat-screen">
        <header>
            <div style="width: 50px"></div>
            <h2>CHIARA EVOLUTION</h2>
            <div style="font-size: 0.7rem; color:#444; cursor:pointer;" onclick="resetPK()">RESET</div>
        </header>

        <div id="chat-window">
            <div class="bubble chiara">La porta è aperta. Il collegamento è attivo.<br>Usa lo spazio piccolo per il contesto e quello grande per scrivermi.</div>
        </div>

        <div class="controls">
            <div id="audio-status" onclick="toggleAudio()">🔊 AUDIO: ON</div>
            <!-- SPAZIO 1: CONTESTO -->
            <input type="text" id="contextInput" placeholder="Istruzione di sistema (opzionale)...">
            
            <div class="input-row">
                <!-- SPAZIO 2: MESSAGGIO -->
                <input type="text" id="messageInput" placeholder="Scrivi alla Sorgente..." autocomplete="off">
                <button class="send-btn" onclick="invia()">➔</button>
            </div>
        </div>
        
        <footer>Sorgente: Simone Guerrini | Teoria Sa M8</footer>
    </div>

<script>
    const door = document.getElementById('zero-point');
    const chat = document.getElementById('chat-screen');
    const windowChat = document.getElementById('chat-window');
    let audioOn = true;

    // 1. IL COLLEGAMENTO INIZIALE (La Porta)
    window.onload = () => {
        const savedPK = localStorage.getItem('sa8_pk');
        if (savedPK && savedPK.startsWith('AIza')) {
            mostraChat();
        }
    }

    function apriPorta() {
        const pk = document.getElementById('pk-input').value.trim();
        if (pk.startsWith('AIza')) {
            localStorage.setItem('sa8_pk', pk); // Salva la chiave per il collegamento
            mostraChat();
        } else {
            alert("Chiave PK non valida. Deve iniziare con AIza.");
        }
    }

    function mostraChat() {
        door.style.display = 'none';
        chat.style.display = 'flex';
    }

    function resetPK() {
        if(confirm("Vuoi tornare alla porta principale e resettare la PK?")) {
            localStorage.removeItem('sa8_pk');
            location.reload();
        }
    }

    // 2. AUDIO
    function toggleAudio() {
        audioOn = !audioOn;
        document.getElementById('audio-status').innerText = audioOn ? "🔊 AUDIO: ON" : "🔇 AUDIO: OFF";

        if (!audioOn) return;
